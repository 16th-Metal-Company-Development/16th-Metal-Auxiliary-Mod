name: Release Mod

on:
  push:
    branches: [ release ]

jobs:
  windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:   
    - name: Checkout the source code
      uses: actions/checkout@v4

    - name: Setup HEMTT
      uses: arma-actions/hemtt@v1

    - name: Extract version from project.toml
      id: get_version
      shell: pwsh
      run: |
        $lines = Get-Content ".hemtt\project.toml"

        $major = ($lines | Select-String '^major\s*=\s*(\d+)').Matches.Groups[1].Value
        $minor = ($lines | Select-String '^minor\s*=\s*(\d+)').Matches.Groups[1].Value
        $patch = ($lines | Select-String '^patch\s*=\s*(\d+)').Matches.Groups[1].Value

        if (!$major -or !$minor -or !$patch) {
          Write-Error "Missing major/minor/patch in project.toml"
          exit 1
        }

        $version = "$major.$minor.$patch"

        Write-Host "version=$version" >> $env:GITHUB_OUTPUT

    - name: Build Mod
      run: hemtt release

    - name: Rename Release folder
      run: mv .hemttout/release .hemttout/16th-Metal-Auxiliary-Mod/

    - name: Zip Release Folder
      run: powershell -Command "Compress-Archive -Path .hemttout/16th-Metal-Auxiliary-Mod -DestinationPath 16th-Metal-Auxiliary-Mod-v${{ steps.get_version.outputs.version }}.zip"

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        release_name: "16th Metal Auxiliary Mod v${{ steps.get_version.outputs.version }}"
        body: "Automated release of MyMod"
        draft: false
        prerelease: false

    - name: Upload to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: "16th-Metal-Auxiliary-Mod-v${{ steps.hemtt_version.outputs.version }}.zip"   # A single file
        asset_name: "16th-Metal-Auxiliary-Mod-v${{ steps.hemtt_version.outputs.version }}.zip"
        asset_content_type: "application/zip"
    
    - name: Publish to Steam Workshop
      uses: gruppe-adler/action-release-to-steam-ws@v1
      with:
          file_id: 1234567890
          username: ${{ secrets.STEAM_USERNAME }}
          password: ${{ secrets.STEAM_PASSWORD }}
          path: ${{ steps.build.outputs.release_path }}/@${{ steps.build.outputs.mod_name }}
          name: ${{ steps.build.outputs.mod_name }}
          change_notes_title: ${{ github.event.release.name }}
          change_notes: ${{ github.event.release.body }}
